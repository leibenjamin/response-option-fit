      <header class="colophon-head">
        <p class="colophon-eyebrow">Production notes</p>
        <h1 class="colophon-title" id="colophon-title" tabindex="-1">Colophon</h1>
        <p class="colophon-deck">How this exhibit was made</p>
      </header>

      <section class="colophon-section" aria-labelledby="colophon-what">
        <h2 id="colophon-what">What this is</h2>
        <p>Response Option Fit Lab is a static editorial exhibit about a narrow problem: how survey answer choices can fail before analysis begins. The public page leads with the literal title "When survey answer choices don't match real answers" and uses worked examples, drawn from public cognitive-testing materials and clearly labeled scenarios, to make six recurring answer-choice problems visible. It is not a guide to validated replacement wording, a model of respondent distributions, or a substitute for cognitive testing, expert review, or field evidence.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-audience">
        <h2 id="colophon-audience">Who this is for</h2>
        <p>For people who write survey questions and answer choices and need a sharper prefielding check.</p>
        <p>For researchers, editors, and product teams who inherit instruments and need language for diagnosing option-level problems.</p>
        <p>For students and instructors who want worked examples in response process, not a general survey-methods textbook.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-why">
        <h2 id="colophon-why">Why it exists</h2>
        <p>A large share of survey criticism arrives too late. By the time a draft is challenged, the conversation is often already about estimates, models, or dashboards, even though many failures begin earlier, when a person has to fit a real situation into answer choices that are ambiguous, overbroad, overlapping, or more precise than the form can justify. Public cognitive-testing work repeatedly shows that apparently small category and wording decisions change how people interpret what is being asked. This exhibit exists to make that pre-analytic layer visible enough to inspect, discuss, and revise before the error hardens into data.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-author">
        <h2 id="colophon-author">Who made this</h2>
        <p>Response Option Fit Lab was written, edited, and verified by <strong>Ben Lei</strong>.</p>
        <p>Initial scaffolding and early editorial drafts were developed with help from Claude Code by Anthropic and Codex by OpenAI. Those tools were used to sketch structure, propose code patterns, and generate candidate prose. Source verification against the cited public documents, final wording, inclusion and exclusion decisions, pedagogy choices, and all claims on this site were made by the author.</p>
        <p class="colophon-strong">AI helped scaffold and draft. Sources, claims, and teaching choices are mine.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-sources">
        <h2 id="colophon-sources">Sources and method</h2>
        <p>Most worked examples begin with public working papers and linked PDFs from the U.S. Census Bureau, especially cognitive-testing materials for ACS, AHS, CPS, and NTIA Internet Use Survey instruments. Because Census working papers are discussion documents rather than final agency publications, each example is checked manually against the cited PDF before publication and quoted only where wording and attribution are stable. Cross-country reinforcement examples come from the UK Office for National Statistics where they document the same pattern with measured before/after evidence.</p>
        <p>When a publishable transcript, verbatim exchange, close paraphrase, or report finding is available, the exhibit labels it <strong>Source-backed finding</strong>. When the source reports a pattern, summarizes a response, or describes an issue without a usable transcript, the exhibit labels the constructed teaching case <strong>Authored scenario</strong>. Authored scenarios are evidence-shaped teaching devices built from the source description; they are not presented as verbatim records.</p>
        <p>Counterexamples are chosen for scope control, not for victory. Their job is to show a nearby form that does <strong>not</strong> obviously trigger the same diagnosis, so the six patterns do not turn into a hammer that hits every hard question on the page. A counterexample here is not a validated recommendation and should not be read as one. This is closer to The Pudding's method-note practice than to an optimization claim: show the sourcing, show the manual judgment, and keep the claim smaller than the temptation.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-pedagogy">
        <h2 id="colophon-pedagogy">Why it teaches this way</h2>
        <p>This exhibit uses a small, declared set of learning ideas rather than a generic "science of learning" halo. Each worked example asks for a prediction before an explanation because prequestions and pretests can increase later learning when learners then study the answer; the pattern is promising, but the size and generality of the benefit vary by procedure and assessment. Steven Pan and Shana Carpenter are the main grounding here. Their 2023 review supports pre-instruction questioning as a useful design move, while later synthesis also makes clear that benefits are often stronger for the prompted material than for broad untargeted transfer.</p>
        <p>The six-pattern sequence stays fixed while cases vary because interleaving helps people learn discriminations between confusable categories better than long blocked runs often do. That is the reason to revisit the same label set across different examples instead of exhausting one pattern before moving to the next. The relevant grounding is Matthias Brunmair and Tobias Richter's meta-analysis: encouraging overall, but clearly moderated by the type of material.</p>
        <p>The loop is segmented because dense multimedia can overload attention. The five-step shell gives the learner a stable sequence, and each pattern name is defined in plain language before the harder casework begins. That follows the segmenting and pre-training principles associated with Richard Mayer and colleagues, including the Mayer and Pilegard chapter you named.</p>
        <p>The exhibit also accepts a mild amount of productive friction. Prediction usually feels worse than rereading, and learners often misread fluent performance as durable learning. That is the useful warning from Nicholas Soderstrom and Robert Bjork, and it is one reason the worked examples do not skip straight to diagnosis.</p>
        <p>For learning category-like distinctions, adjacent comparison matters. That is why the quick-practice cases should stay short and contrastive. The most direct support is Nate Kornell and Robert Bjork's work on spaced and interleaved induction. The retrieval rationale for asking learners to commit before the reveal comes from Henry Roediger and Jeffrey Karpicke.</p>
        <p>None of this should be oversold. Prequestioning research still contains live debates about why benefits happen and about how far benefits generalize beyond the specific prompted material, and retrieval-based transfer gains appear stronger under some conditions than others. A good colophon should say that plainly.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-access">
        <h2 id="colophon-access">Accessibility</h2>
        <p>Accessibility is treated here as release work, not as a certification claim. The page is built to common WCAG 2.2 AA expectations, but coverage is bounded by what is actually tested rather than asserted in the abstract.</p>
        <p><strong>Tested in CI</strong> on every build:</p>
        <ul>
          <li>keyboard navigation through every worked-example step in headless Chromium, including widget operation by Space, Enter, and arrow keys;</li>
          <li>skip-link is the first focusable element on the exhibit page and lands on the main exhibit;</li>
          <li>page changes move focus to the page heading and announce the transition through a polite live region;</li>
          <li>widget state is exposed for assertions and announced through a shared lexicon of polite-live-region templates;</li>
          <li>WCAG AA body-text contrast against the page background;</li>
          <li>no horizontal overflow at 1280, 1440, 1920, and Pixel-5 mobile widths;</li>
          <li>answer-choice diagram dots stay equal-diameter at 100%, 125%, and 150% zoom and remain visible under <code>forced-colors</code>;</li>
          <li>reduced-motion media query collapses transitions to zero duration;</li>
          <li>no inline event handlers, no inline scripts, no third-party network requests on load.</li>
        </ul>
        <p><strong>Known gaps and pending work.</strong> Manual screen-reader walkthroughs in NVDA, JAWS, and VoiceOver are pending. Manual zoom audits at 200% and 400% are pending. Cross-browser audits in Firefox and Safari are pending. The exhibit is not yet certified against WCAG 2.2 AA; what is published here is the test surface a build cannot ship without.</p>
        <p>Accessibility issues are taken seriously. Report bugs at <a href="mailto:contact@benlei.org">contact@benlei.org</a> or open an issue at <a href="https://github.com/leibenjamin/response-option-fit/issues" target="_blank" rel="noopener noreferrer">github.com/leibenjamin/response-option-fit/issues</a>, and please include browser, device, assistive technology, and reproduction steps.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-privacy">
        <h2 id="colophon-privacy">Privacy and performance</h2>
        <p>This exhibit has no analytics, no ad tech, no cookies, and no third-party runtime requests. The only persistent storage is optional settings data saved to localStorage after an explicit opt-in. Worked-example progress is not saved in this release. Stored data stays in the browser for this origin until you export it, replace it, or clear it. Export writes a local file; import reads one back on-device; Clear removes the stored data for this site.</p>
        <p>The performance budget is a release-review target, not a hard law: no network calls after initial load, JavaScript at or below <strong>100 KB gzip</strong>, CSS at or below <strong>35 KB gzip</strong>. Current release: <strong>JS 91.08 KB gzip</strong>, <strong>CSS 9.40 KB gzip</strong>, measured <strong>2026-05-06</strong>. Regressions are editorially visible changes, not private engineering trivia; if a release exceeds the target, the colophon says why the added weight is worth it. If motion is reduced, the exhibit keeps it reduced. If forced-colors is active, the user's contrast choices win.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-decisions">
        <h2 id="colophon-decisions">Decisions log</h2>
        <h3>ADR — Why six failure patterns</h3>
        <p>Context: the exhibit needs a taxonomy small enough to learn and large enough to feel real. Decision: keep the scope to six recurrent option-level failures that can be named quickly and contrasted across worked examples. Consequences: the page gets a reusable vocabulary and stronger transfer; it also excludes many real survey problems that live elsewhere, including sampling, question flow, mode, translation, and estimation issues. Alternatives considered: a broader survey-defects atlas, or a looser scrapbook of examples without named categories. The chosen approach is narrower, but teachably narrow.</p>
        <h3>ADR — Why static diagnostics instead of computed scoring</h3>
        <p>Context: once a taxonomy exists, there is pressure to turn it into a checklist or score. Decision: keep the diagnoses hand-authored and static. Consequences: every diagnosis remains inspectable, arguable, and tied to a source, but the exhibit scales more slowly and cannot pretend to automate review. Alternatives considered: heuristic scoring, LLM-generated diagnostics, or interactive rubrics. Those options would add speed and false authority at the same time. This exhibit should prefer explicit judgment over synthetic precision.</p>
        <h3>ADR — Why opt-in localStorage instead of a backend</h3>
        <p>Context: the exhibit wants a transparent local settings surface without collecting accounts or behavioral data. Decision: save only the settings opt-in state in this release, and save it locally in the browser after explicit consent. Worked-example progress is deliberately not persisted yet. Consequences: the privacy posture stays simple, there is no account surface to secure, and export/import remains possible for stored local data. Alternatives considered: automatic local saving, progress persistence, cloud sync, account-based persistence. Those would buy convenience at the cost of a very different data story.</p>
        <h3>ADR — Why one worked-example shell across all six patterns</h3>
        <p>Context: bespoke pages are tempting because each failure pattern invites its own visual treatment. Decision: keep one five-step shell — Frame, Predict, Diagnose, Probe, Reveal — across the exhibit. Consequences: cognitive overhead drops, transfer improves, accessibility testing is more tractable, and the reader learns the shell once. The tradeoff is less local flourish. Alternatives considered: one custom layout per pattern or one long essay per pattern. Both would likely feel richer in isolation and weaker across the set.</p>
        <h3>ADR — Why drop scale anchoring and add forced precision</h3>
        <p>Context: early taxonomies often drift toward every familiar survey pathology, whether or not it belongs at the response-option layer. Decision: remove scale anchoring from the core six and replace it with forced precision. Consequences: the taxonomy gets sharper about response-option fit and less diffuse about general scale design. Alternatives considered: keeping both, merging them, or leaving scale anchoring in as a "classic." Forced precision earns the slot because it is easier to show in worked option sets and closer to the exhibit's central claim about failure before analysis.</p>
      </section>

      <section class="colophon-section" aria-labelledby="colophon-limits">
        <h2 id="colophon-limits">Limits</h2>
        <p>This exhibit does not:</p>
        <ul>
          <li>validate alternative wording;</li>
          <li>estimate respondent distributions, prevalence, or downstream bias magnitude;</li>
          <li>replace cognitive testing, expert review, or field piloting;</li>
          <li>cover every source of survey error;</li>
          <li>treat editorial illustrations as primary evidence;</li>
          <li>imply endorsement by the U.S. Census Bureau, the Office for National Statistics, NSSE, NTIA, HUD, or any other agency or institution;</li>
          <li>prove that learning gains occur simply because the worked-example flow exists;</li>
          <li>compute diagnoses or assign authoritative scores to instruments.</li>
        </ul>
        <p>The label 'forced_precision' is editorially synthesized; the underlying wording and memory problems are documented separately in QAS-99 §4b and Bradburn, Rips &amp; Shevell (1987).</p>
      </section>
